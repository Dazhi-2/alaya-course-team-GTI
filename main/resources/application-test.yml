spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop   # 测试结束清空
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never              # 不执行 data.sql
  h2:
    console:
      enabled: false           # 测试环境不需要控制台